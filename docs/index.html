<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rumi — Stones & Provenance (MVP)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <h1>Rumi</h1>
      <p class="tagline">Automating compliance, illuminating provenance.</p>
    </div>
    <nav class="quick-actions">
      <button id="btn-browse">Browse Stones</button>
      <button id="btn-mint">Mint New NFT</button>
      <button id="btn-compliance">Compliance Dashboard</button>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-image" id="hero-image">🪨</div>
      <div class="hero-info">
        <h2 id="hero-title">Featured stone</h2>
        <p id="hero-provenance">Origin: — · Artisan: — · Cut: —</p>
        <div class="hero-actions">
          <button id="hero-view">View Stone</button>
          <button id="hero-buy">Buy with RUMI</button>
        </div>
      </div>
    </section>

    <section class="filters">
      <label>Type: <select id="filter-type"><option value="">All</option></select></label>
      <label>Region: <select id="filter-region"><option value="">All</option></select></label>
      <label>Cut: <select id="filter-cut"><option value="">All</option></select></label>
      <label>Mounted: <select id="filter-mounted"><option value="">Any</option><option value="true">Mounted</option><option value="false">Unmounted</option></select></label>
      <input id="search" placeholder="Search by stone id, artisan or miner" />
    </section>

    <section id="marketplace" class="marketplace">
      <!-- stone cards injected here -->
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close" id="modal-close">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">Rumi MVP — demo UI · Local sample data</footer>

  <script src="app.js"></script>
</body>
</html>
